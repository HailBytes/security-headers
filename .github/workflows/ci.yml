name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # vitest 4's dependency chain (vite -> rolldown) requires Node
        # ^20.19.0 || >=22.12.0 and crashes with a Startup Error before any
        # test runs on Node 18 — see `npm test` failure on this leg.
        node-version: ['20', '22']
    name: Node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm install --include=dev
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
